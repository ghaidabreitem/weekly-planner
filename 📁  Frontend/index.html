<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Weekly Planner</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    padding: 30px;
    display: flex;
    justify-content: center;
}

.app {
    width: 900px;
}

.title {
    text-align: center;
    color: white;
    margin-bottom: 20px;
    font-size: 28px;
    font-weight: bold;
}

/* INPUT SECTION */
.input-box {
    background: white;
    padding: 15px;
    border-radius: 12px;
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

input, select {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    flex: 1;
}

button.add {
    background: #4CAF50;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

/* DAYS GRID */
.board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

/* DAY CARD */
.day-card {
    background: white;
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

.day-title {
    font-weight: bold;
    margin-bottom: 10px;
    color: #333;
    border-bottom: 1px solid #eee;
    padding-bottom: 5px;
}

/* TASK ITEM */
.task {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f5f5f5;
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 8px;
}

.done {
    text-decoration: line-through;
    opacity: 0.6;
}

.btn {
    border: none;
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 6px;
}

.ok {
    background: #4CAF50;
    color: white;
}

.del {
    background: #ff4d4d;
    color: white;
}
</style>
</head>

<body>

<div class="app">

<div class="title">📅 Weekly Planner Pro</div>

<div class="input-box">
    <input id="task" placeholder="Task">
    <select id="day">
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
        <option>Saturday</option>
        <option>Sunday</option>
    </select>
    <button class="add" onclick="addTask()">Add</button>
</div>

<div class="board" id="board"></div>

</div>

<script>

const API = "http://127.0.0.1:8000";

async function addTask() {
    let title = document.getElementById("task").value;
    let day = document.getElementById("day").value;

    await fetch(`${API}/tasks`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({title, day})
    });

    loadTasks();
}

async function toggleTask(id) {
    await fetch(`${API}/tasks/${id}`, {
        method: "PATCH"
    });

    loadTasks();
}

async function deleteTask(id) {
    await fetch(`${API}/tasks/${id}`, {
        method: "DELETE"
    });

    loadTasks();
}

async function loadTasks() {
    let res = await fetch(`${API}/tasks`);
    let data = await res.json();

    let days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
    let board = document.getElementById("board");

    board.innerHTML = "";

    days.forEach(day => {

        let column = document.createElement("div");
        column.className = "day-card";

        let html = `<div class="day-title">${day}</div>`;

        data.filter(t => t.day === day).forEach(t => {
            html += `
                <div class="task">
                    <span class="${t.completed ? 'done' : ''}">
                        ${t.title}
                    </span>

                    <div>
                        <button class="btn ok" onclick="toggleTask(${t.id})">✔</button>
                        <button class="btn del" onclick="deleteTask(${t.id})">X</button>
                    </div>
                </div>
            `;
        });

        column.innerHTML = html;
        board.appendChild(column);
    });
}

loadTasks();

</script>

</body>
</html>
